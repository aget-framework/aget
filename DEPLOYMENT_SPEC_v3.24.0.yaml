version: "3.24.0"
spec_version: "2.0.0"
created: "2026-06-27"
status: active
supersedes: "DEPLOYMENT_SPEC_v3.23.1.yaml"
breaking_release: false
backfill: true

verification_script:
  file: "scripts/verify_deployment.py"
  usage: "python3 scripts/verify_deployment.py --version 3.24.0 --path /path/to/agent"
  known_defects: "Treat tooling output as claim-under-test, not premise (L908)."

mandatory_changes:
  - id: "M-3.24-1"
    description: "version.json aget_version field set to '3.24.0'"
    blocking: true
    detection: "test $(jq -r .aget_version .aget/version.json) = '3.24.0'"
  - id: "M-3.24-2"
    description: "AGENTS.md @aget-version header set to '3.24.0'"
    blocking: true
    detection: "grep -q '^@aget-version: 3.24.0' AGENTS.md"
  - id: "M-3.24-3"
    description: "manifest.yaml version aligned to 3.24.0 (L444 coherence triplet)"
    blocking: true
    detection: "grep -q '3.24.0' manifest.yaml"

additive_artifacts:
  - id: "A-3.24-1"
    description: "R-BND-001 Boundary & Reliance Requirements present at specs/requirements/"
    blocking: false
    canonical_source: "aget/specs/requirements/R-BND-001_boundary_reliance.md"
    detection: "test -f specs/requirements/R-BND-001_boundary_reliance.md"
  - id: "A-3.24-2"
    description: "Skill-reliance manifest schema + validator (schemas/skill_reliance_manifest.schema.yaml + scripts/check_skill_reliance_manifest.py)"
    blocking: false
    canonical_source: "aget/schemas/skill_reliance_manifest.schema.yaml"
    detection: "test -f schemas/skill_reliance_manifest.schema.yaml && test -f scripts/check_skill_reliance_manifest.py"
  - id: "A-3.24-3"
    description: "AGET_HOST_RUNTIME_SPEC v1.0.0 present at specs/ (host-runtime filesystem-layout standard)"
    blocking: false
    canonical_source: "aget/specs/AGET_HOST_RUNTIME_SPEC.md"
    detection: "test -f specs/AGET_HOST_RUNTIME_SPEC.md"
    note: "Behavioral conformance V-tests activate at first node deployment (honest-testability, ADR-007)."

optional_changes:
  - id: "O-3.24-1"
    description: "Author .aget/skill_reliance_manifest.yaml to adopt the reliance contract (self-check via validator)"
    blocking: false
    note: "Only if the agent declares a reliance contract."

