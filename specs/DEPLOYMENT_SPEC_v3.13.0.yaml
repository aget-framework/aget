# DEPLOYMENT_SPEC_v3.13.0.yaml
# Complete target state specification for v3.13.0 deployment
#
# Purpose: Define what a correctly-deployed v3.13.0 agent looks like.
# Usage: Supervisors use this to verify fleet deployments.
# Governance: R-DEP-002 (State-Based Deployment Requirement), R-REL-038
#
# Created: 2026-04-12
# Origin: DEPLOYMENT_SPEC_v3.12.0.yaml
# Release: Operational Maturation & Fleet Automation

version: "3.13.0"
spec_version: "1.7.0"
created: "2026-04-12"
status: active
supersedes: "DEPLOYMENT_SPEC_v3.12.0.yaml"

# =============================================================================
# VERIFICATION SCRIPT (REQ-REL-F-007, L754)
# =============================================================================

verification_script:
  file: "scripts/verify_deployment.py"
  usage: "python3 scripts/verify_deployment.py --version 3.13.0 --path /path/to/agent"
  checks: 8
  exit_codes:
    0: "PASS (all checks OK, or OK with warnings)"
    1: "FAIL (one or more checks failed)"

# =============================================================================
# VERSION INDICATORS
# =============================================================================

version_indicators:
  version_json:
    path: ".aget/version.json"
    field: "aget_version"
    value: "3.13.0"
    verification: "jq -r .aget_version .aget/version.json"

  agents_md:
    path: "AGENTS.md"
    pattern: "@aget-version: 3.13.0"
    verification: "grep '@aget-version' AGENTS.md"

  manifest_yaml:
    path: "manifest.yaml"
    field: "version"
    value: "3.13.0"
    verification: "yq -r .version manifest.yaml"

  readme_md:
    path: "README.md"
    pattern: "**Version**: v3.13.0"
    verification: "grep 'Version' README.md | head -1"

# =============================================================================
# WHAT'S NEW IN v3.13.0
# =============================================================================

whats_new:
  summary: "Operational Maturation & Fleet Automation"
  breaking_changes: false

  highlights:
    - title: "Release Gate Validator"
      description: "validate_release_gate.py — orchestrates 7 validators, gates on combined exit codes. Structural fix for L784 (Observation Without Consequence)."

    - title: "Fleet Upgrade Script"
      description: "fleet_upgrade.py — single-script migration across 14 repos. Reduces 25-40 permission prompts to ≤5. Dry-run mode, JSON output."

    - title: "Release Delivery Triad v0.2.0"
      description: "Builder (SP-012), Spec Auditor (SP-013), Critic (SP-014) — three-perspective quality at gate boundaries. Requirements sections, tool integration, telemetry."

    - title: "8 New Skills (24→31)"
      description: "promote-issue, describe-session, propose-actions, create-rubric, check-initiative, process-observation, open-session, check-facts. All with Requirements tables."

    - title: "Skill Telemetry Infrastructure"
      description: "SKILL.template.md mandatory Requirements section. log_skill_invocation.py → skill_invocations.jsonl."

    - title: "3 New Specs"
      description: "HEALTH_CHECK_ORCHESTRATION_SPEC (3 tiers), WIND_DOWN_DISPLAY_SPEC (output format), GOVERNED_DISCOURSE_BOUNDARY_SPEC (vocabulary governance)."

# =============================================================================
# NEW IN v3.13.0: SKILLS
# =============================================================================

new_skills:
  description: "8 new skills added to .claude/skills/"
  source: "template-worker-aget/.claude/skills/ (universal skills)"
  new_in: "3.13.0"

  skills:
    - name: "aget-promote-issue"
      category: "Governance"
      proposal: "SP-004"
      conflict_resolution: "NEW — no prior organic version expected"

    - name: "aget-describe-session"
      category: "Session"
      proposal: "SP-009"
      conflict_resolution: "NEW — no prior organic version expected"

    - name: "aget-propose-actions"
      category: "Research"
      proposal: "SP-011"
      conflict_resolution: "NEW — may conflict with organic aget-step-back. Template version takes precedence."

    - name: "aget-create-rubric"
      category: "Governance"
      proposal: "SP-003"
      conflict_resolution: "NEW — no prior organic version expected"

    - name: "aget-check-initiative"
      category: "Governance"
      proposal: "SP-004b"
      conflict_resolution: "NEW — no prior organic version expected"

    - name: "aget-process-observation"
      category: "Knowledge Management"
      proposal: "SP-002"
      conflict_resolution: "NEW — no prior organic version expected"

    - name: "aget-open-session"
      category: "Session"
      proposal: "SP-010"
      conflict_resolution: "NEW — no prior organic version expected"

    - name: "aget-check-facts"
      category: "Quality"
      proposal: "SP-007"
      conflict_resolution: "NEW — no prior organic version expected"

  conflict_resolution_guide: |
    For each new skill:
    1. Check if agent has organic version in .claude/skills/{skill-name}/
    2. If organic version exists: compare with template version
       - If template version is superset: adopt template, archive organic
       - If organic has domain-specific additions: merge (keep organic extras)
    3. If no organic version: deploy template version directly

# =============================================================================
# UPGRADED SKILLS
# =============================================================================

upgraded_skills:
  - name: "aget-release-build"
    from: "0.1.0"
    to: "0.2.0"
    change: "Added Requirements section, template sync check, gate validator integration"

  - name: "aget-release-audit-specs"
    from: "0.1.0"
    to: "0.2.0"
    change: "Added Requirements section, gate validator consumption, telemetry logging"

  - name: "aget-release-critique"
    from: "0.1.0"
    to: "0.2.0"
    change: "Added Requirements section, sibling report consumption, telemetry logging"

  - name: "aget-expand-ontology"
    from: "2.0.0"
    to: "2.1.0"
    change: "Added --provenance parameter (EO-030) and Step 10c embedded retro (EO-031)"

# =============================================================================
# SKILL TEMPLATE CHANGE
# =============================================================================

skill_template:
  path: "templates/skill/SKILL.template.md"
  change: "Added mandatory ## Requirements section"
  new_in: "3.13.0"
  action: "New skills created after v3.13.0 MUST include Requirements table"

# =============================================================================
# NEW SCRIPTS
# =============================================================================

new_scripts:
  - name: "validate_release_gate.py"
    path: "scripts/validate_release_gate.py"
    description: "Orchestrates release validators with exit-code gating"
    applies_to: "framework-AGET only (not fleet agents)"

  - name: "fleet_upgrade.py"
    path: "scripts/fleet_upgrade.py"
    description: "Single-script fleet migration"
    applies_to: "framework-AGET only (not fleet agents)"

  - name: "log_skill_invocation.py"
    path: "scripts/log_skill_invocation.py"
    description: "Skill telemetry logger"
    applies_to: "all agents (optional)"

  - name: "check_script_divergence.py"
    path: "scripts/check_script_divergence.py"
    description: "Track script divergence across fleet templates"
    applies_to: "framework-AGET only"

# =============================================================================
# UPGRADE STEPS (for fleet supervisors)
# =============================================================================

upgrade_steps:
  - step: 1
    obligation: "MUST"
    action: "Update .aget/version.json aget_version to 3.13.0"
    verification: "jq -r .aget_version .aget/version.json"

  - step: 2
    obligation: "MUST"
    action: "Update @aget-version to 3.13.0 in AGENTS.md/CLAUDE.md"
    verification: "grep '@aget-version: 3.13.0' AGENTS.md"

  - step: 3
    obligation: "SHOULD"
    action: "Deploy 8 new skills from template .claude/skills/ (see conflict_resolution_guide)"
    verification: "ls .claude/skills/aget-promote-issue/SKILL.md .claude/skills/aget-check-facts/SKILL.md 2>/dev/null"

  - step: 4
    obligation: "SHOULD"
    action: "Update 3 upgraded skills (release-build, release-audit-specs, release-critique) to v0.2.0"
    verification: "grep 'v0.2.0' .claude/skills/aget-release-build/SKILL.md"

  - step: 5
    obligation: "SHOULD"
    action: "Run health check"
    verification: "python3 scripts/health_check.py"
