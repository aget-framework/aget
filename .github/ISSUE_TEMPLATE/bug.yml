name: Bug Report
description: Report a bug in the AGET framework
title: "[bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide enough detail so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run command '...'
        2. Observe '...'
        3. Expected '...' but got '...'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AGET Version
      description: What version of the AGET framework are you using?
      placeholder: "e.g., 3.11.1"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Framework Domain
      description: Which area of the AGET framework is affected?
      options:
        - Core framework (aget/)
        - Templates (template-*)
        - Governance & specs
        - Release process
        - Session protocol (wake-up, wind-down, etc.)
        - Skills
        - Ontology & vocabulary
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (blocks usage)
        - High (significant impact, workaround exists)
        - Medium (minor impact)
        - Low (cosmetic or edge case)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details?
      placeholder: |
        - OS: macOS 14.x
        - CLI: Claude Code v1.x
        - Shell: zsh
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots?
    validations:
      required: false
