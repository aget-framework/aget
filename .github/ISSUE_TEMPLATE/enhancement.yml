name: Enhancement Request
description: Suggest an improvement to an existing AGET framework feature
title: "[enhancement] "
labels: ["type:enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to the AGET framework.
        Please fill out the sections below so we can evaluate and prioritize your request.

  - type: textarea
    id: description
    attributes:
      label: Enhancement Description
      description: What improvement would you like to see?
      placeholder: Describe the enhancement clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this enhancement needed? What problem does it solve?
      placeholder: Describe the use case or pain point this addresses.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you approach this enhancement?
      placeholder: Describe your proposed approach, if any.
    validations:
      required: false

  - type: dropdown
    id: domain
    attributes:
      label: Framework Domain
      description: Which area of the AGET framework does this affect?
      options:
        - Core framework (aget/)
        - Templates (template-*)
        - Governance & specs
        - Release process
        - Session protocol (wake-up, wind-down, etc.)
        - Skills
        - Ontology & vocabulary
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
      placeholder: Describe alternatives you've considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references?
    validations:
      required: false
