version: "3.23.1"
spec_version: "2.0.0"
created: "2026-06-27"
status: active
supersedes: "DEPLOYMENT_SPEC_v3.23.0.yaml"
breaking_release: false
backfill: true

verification_script:
  file: "scripts/verify_deployment.py"
  usage: "python3 scripts/verify_deployment.py --version 3.23.1 --path /path/to/agent"
  known_defects: "Treat tooling output as claim-under-test, not premise (L908)."

mandatory_changes:
  - id: "M-3.23.1-1"
    description: "version.json aget_version field set to '3.23.1'"
    blocking: true
    detection: "test $(jq -r .aget_version .aget/version.json) = '3.23.1'"
  - id: "M-3.23.1-2"
    description: "AGENTS.md @aget-version header set to '3.23.1'"
    blocking: true
    detection: "grep -q '^@aget-version: 3.23.1' AGENTS.md"
  - id: "M-3.23.1-3"
    description: "manifest.yaml version aligned to 3.23.1 (L444 coherence triplet)"
    blocking: true
    detection: "grep -q '3.23.1' manifest.yaml"

additive_artifacts:
  - id: "A-3.23.1-1"
    description: "AGET_GOAL_SPEC v0.2.0 PROMOTED to canonical specs/ (Goal artifact; KAOS typing Achieve/Maintain/Soft; ≥1-loop requirement)"
    blocking: false
    canonical_source: "aget/specs/AGET_GOAL_SPEC.md"
    detection: "test -f specs/AGET_GOAL_SPEC.md"
  - id: "A-3.23.1-2"
    description: "aget-create-goal + aget-propose-goals skills (propose→commit verb pair, spec now canonical)"
    blocking: false
    canonical_source: "aget/.claude/skills/aget-create-goal/SKILL.md"
    detection: "test -f .claude/skills/aget-create-goal/SKILL.md && test -f .claude/skills/aget-propose-goals/SKILL.md"
  - id: "A-3.23.1-3"
    description: "aget-close-project skill + scripts/close_authorization_guard.py (close-time auth guard wired as Step 2.5 — blocks close claiming authorization without a linked event)"
    blocking: false
    canonical_source: "aget/.claude/skills/aget-close-project/SKILL.md"
    detection: "test -f .claude/skills/aget-close-project/SKILL.md && test -f scripts/close_authorization_guard.py"
    note: "This is the capability built-but-NOT-shipped in v3.23.0; lands here with template propagation."

optional_changes:
  - id: "O-3.23.1-1"
    description: "Committed/aspirational two-tier Goal store (governance/GOALS.md + .aget/goals/aspirational.jsonl)"
    blocking: false
    note: "Only if the agent maintains committed Goals."

propagation_gap:
  status: "PROPAGATED — per CHANGELOG, version 3.23.0→3.23.1 across aget/ + 13 templates; the three new skills synced to all templates dependency-aware (with their engine scripts). (Back-fill note: template reachability not independently re-verified at this back-fill date; flagged for the consumer-gate received-state check, this plan Gate 4/5.)"
  tracking: "n/a (no open propagation defect recorded for v3.23.1)"

breaking_changes:
  count: 0
  note: "None. Fast-follow additive. Full Goal-Value scoring rubric deferred to a future release."

completion_response:
  release_outcome_report_required: true
  rubric: "aget/rubrics/RUBRIC_fleet_upgrade_outcome_v1.1.md"
  minimum_score: 10

references:
  changelog: "aget/CHANGELOG.md (v3.23.1 entry, 2026-06-20)"
  backfill_authority: "principal /aget-ask Q2:B 2026-06-27; PROJECT_PLAN_v3.24_fleet_completion_consumer_gate_v1.0 Gate 1"
