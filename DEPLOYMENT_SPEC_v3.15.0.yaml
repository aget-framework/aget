# =============================================================================
# UPGRADE STEPS (for fleet supervisors)
# =============================================================================

upgrade_steps:

  # --- Pre-flight (BC-001) ---
  bc_001_preflight:
    step: "PRE-A"
    title: "BC-001 Pre-flight: verify no old version.json field names"
    obligation: "MUST"
    action: >
      Run the BC-001 detection grep. If 0 matches: proceed.
      If matches found: update all old field names to aget_-prefixed names first.
    command: |
      grep -rE '"(agent_name|domain|portfolio|managed_by|manages|instance_type|archetype|specialization|template|identity_file|created|updated|intelligence_enabled|collaboration_enabled|capabilities|patterns|migration_history|knowledge_inheritance)"' .aget/ scripts/ .claude/ 2>/dev/null
    pass_condition: "0 matches (or only matches in non-AGET files)"

  # --- Pre-flight (BC-002) ---
  bc_002_preflight:
    step: "PRE-B"
    title: "BC-002 Pre-flight: verify no --fix flag usage"
    obligation: "MUST"
    action: "Run the BC-002 detection grep."
    command: |
      grep -r -- '--fix' .claude/skills/ scripts/ 2>/dev/null
    pass_condition: "0 matches"

  # --- Standard steps ---
  - step: 1
    action: "Update .aget/version.json: set aget_version to '3.15.0'"
    obligation: "MUST"
    verification: "jq -r .aget_version .aget/version.json"
    expected: "3.15.0"

  - step: 2
    action: "Update AGENTS.md header: @aget-version: 3.15.0"
    obligation: "MUST"
    verification: "grep '@aget-version: 3.15.0' AGENTS.md"
    expected: "match"

  - step: 3
    action: "Deploy /aget-enhance-health (SKILL-049 v1.0.0) from template-worker-aget"
    obligation: "SHOULD"
    verification: "ls .claude/skills/aget-enhance-health/SKILL.md"
    expected: "file exists"

  - step: 4
    action: "Update /aget-check-health to v1.1.0 from template-worker-aget"
    obligation: "SHOULD"
    verification: "grep 'v1.1.0' .claude/skills/aget-check-health/SKILL.md"
    expected: "match"

  - step: 5
    action: "Run python3 scripts/health_check.py"
    obligation: "SHOULD"
    verification: "exit code 0"

  - step: 6
    action: "Run contract tests if present: python3 -m pytest tests/ -q"
    obligation: "SHOULD"
    verification: "no failures"

# =============================================================================
# END-STATE VALIDATION
# =============================================================================

end_state_validation:
  quick_check: |
    python3 -c "import json; v=json.load(open('.aget/version.json')); print('PASS' if v.get('aget_version')=='3.15.0' else 'FAIL: '+str(v.get('aget_version','MISSING')))"

  full_check: |
    python3 scripts/verify_deployment.py --version 3.15.0 --path .
