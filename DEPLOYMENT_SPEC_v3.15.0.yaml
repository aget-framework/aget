# DEPLOYMENT_SPEC_v3.15.0.yaml
# Complete target state specification for v3.15.0 deployment
#
# Purpose: Define what a correctly-deployed v3.15.0 agent looks like.
# Usage: Supervisors use this to verify fleet deployments.
# Governance: R-DEP-002 (State-Based Deployment Requirement), R-REL-038
#
# Created: 2026-04-25
# Origin: DEPLOYMENT_SPEC_v3.12.0.yaml (v3.13.0 and v3.14.0 specs were not created)
# Release: Two-Level Model Coherence + Security Hardening + Weekly Cadence Formalization
#
# NOTE: v3.15.0 is the first breaking release in the 3.x minor cycle.
# Two breaking changes require pre-flight checks before upgrade.
# See upgrade_steps.bc_001_preflight and upgrade_steps.bc_002_preflight.

version: "3.15.0"
spec_version: "2.0.0"
created: "2026-04-25"
status: active
supersedes: "DEPLOYMENT_SPEC_v3.12.0.yaml"
breaking_release: true

# =============================================================================
# VERIFICATION SCRIPT (REQ-REL-F-007, L754)
# =============================================================================

verification_script:
  file: "scripts/verify_deployment.py"
  usage: "python3 scripts/verify_deployment.py --version 3.15.0 --path /path/to/agent"
  checks: 8
  exit_codes:
    0: "PASS (all checks OK, or OK with warnings)"
    1: "FAIL (one or more checks failed)"

# =============================================================================
# VERSION INDICATORS
# =============================================================================

version_indicators:
  version_json:
    path: ".aget/version.json"
    field: "aget_version"
    value: "3.15.0"
    verification: "jq -r .aget_version .aget/version.json"
    note: "BC-001: field MUST be 'aget_version' (not legacy 'version' or 'agent_version')"

  agents_md:
    path: "AGENTS.md"
    pattern: "@aget-version: 3.15.0"
    verification: "grep '@aget-version: 3.15.0' AGENTS.md"
    fallback: "grep '@aget-version: 3.15.0' CLAUDE.md"

  manifest_yaml:
    path: "manifest.yaml"
    field: "version"
    value: "3.15.0"
    verification: "yq -r .version manifest.yaml"

  readme_md:
    path: "README.md"
    pattern: "**Version**: v3.15.0"
    verification: "grep 'Version' README.md | head -1"

# =============================================================================
# BREAKING CHANGES (BC-001, BC-002)
# =============================================================================
#
# These MUST be resolved before upgrading.
# See docs/BREAKING_CHANGES_v3.15.md for full migration guide.

breaking_changes:

  # ---------------------------------------------------------------------------
  # BC-001: version.json old field names removed
  # ---------------------------------------------------------------------------
  bc_001:
    id: "BC-001"
    title: "version.json old field names removed"
    description: >
      19 fields were renamed in v3.14.0 (aget_-prefix normalization, ADR-019).
      The dual-read backward-compat shim (which allowed both old and new names)
      was removed in v3.15.0. Any script, skill, or agent code reading old
      field names breaks at upgrade.
    detection: |
      grep -rE '"(agent_name|domain|portfolio|managed_by|manages|instance_type|archetype|specialization|template|identity_file|created|updated|intelligence_enabled|collaboration_enabled|capabilities|patterns|migration_history|knowledge_inheritance)"' .aget/ scripts/ .claude/ 2>/dev/null
    detection_pass: "0 matches"
    remediation: >
      Update each old field name reference in scripts/skills to read the value
      from the correct key. The version.json file's own key names are NOT
      changed by BC-001 — the JSON structure itself is unchanged. Only code
      that reads non-existent aget_-prefixed names (e.g. v['aget_agent_name'])
      needs fixing. See docs/BREAKING_CHANGES_v3.15.md for full context.
    note: >
      SCOPE CLARIFICATION: BC-001 affects code that reads aget_-prefixed field
      names from version.json that do not exist (the JSON still uses old names
      like 'agent_name'). The version.json keys themselves are NOT renamed.
      Confirmed by template-worker-aget canonical state at v3.15.0.

  # ---------------------------------------------------------------------------
  # BC-002: --fix flag removed
  # ---------------------------------------------------------------------------
  bc_002:
    id: "BC-002"
    title: "--fix flag surfaces removed from /aget-check-health"
    description: >
      The --fix flag was documented in /aget-check-health (SKILL-003) and 13+
      SKILL.md surfaces since 2026-02-10 but was never implemented (L671
      decorative classification). Removed in v3.15.0. Any invocation of
      --fix will error. Replacement: /aget-enhance-health (SKILL-049).
    detection: |
      grep -r -- '--fix' .claude/skills/ scripts/ 2>/dev/null
    detection_pass: "0 matches"
    remediation: >
      Replace all --fix invocations with /aget-enhance-health.
      New skill: template-worker-aget/.claude/skills/aget-enhance-health/
    replacement_skill: "SKILL-049 (/aget-enhance-health v1.0.0)"

# =============================================================================
# WHAT'S NEW IN v3.15.0
# =============================================================================

whats_new:
  summary: "Two-Level Model Coherence + Security Hardening + Weekly Cadence Formalization"

  highlights:
    - title: "/aget-enhance-health (SKILL-049 v1.0.0)"
      description: >
        7-phase health remediation. Pairs with /aget-check-health (detect-only)
        as the canonical check→enhance pipeline. Fourth member of the enhance-*
        skill family. Deploys to all 13 templates.

    - title: "AGET_SECURITY_SPEC v0.2"
      description: >
        8 CAP-SEC contracts — 4 outside-threat (boundary enforcement, input
        validation, information disclosure, dependency integrity) + 4
        within-threat (authority overstep, scope creep, output contamination,
        autonomous action bounds). First dedicated security spec.

    - title: "AGET_BUDGET_GRAMMAR_SPEC v0.2"
      description: >
        4 CAP-BGG contracts formalizing budget grammar used across skills
        and session protocols. CAP-BGG-001..004 at full EARS rigor.

    - title: "validate_archetype_skills.py promoted to canonical"
      description: >
        Promoted to aget/verification/. Mechanically enforces CAP-TPL-016-04
        universal-skill mandate. Closes L671 decorative-classification gap.

    - title: "POL-REL-001 (Weekly Saturday Release Policy)"
      description: >
        Formalizes the Saturday release cadence from 6-release empirical
        record (v3.10-v3.15 consecutive Saturdays). All public pushes to
        aget-framework repos: Saturday only (Sunday requires principal approval).

    - title: "ADR-022 (Breaking-Change Policy)"
      description: >
        Ratified 2026-04-25. Codifies Q3=(b) — honor stated deprecation
        timelines. BC-001 and BC-002 are the only grace-period accelerations.

    - title: "CAP-REL-029 (Release Readiness Gate)"
      description: >
        First Wave-1A spec contract. Formalizes pre-release gate checklist
        as a testable EARS requirement.

    - title: "PIR infrastructure"
      description: >
        SOP Phase 7.1.5 — Post-Implementation Review as a BLOCKING gate.
        First dogfood application: this release (D5 score 2/3 pending fleet
        deployment confirmation).

    - title: "Requirements format v1.1 + Path A retrofit"
      description: >
        REQUIREMENTS_FORMAT v1.1 adds optional constraints: field per REQ.
        All 4 published REQ-* docs (CORE, GOV, HOM, REL) retrofitted.
        35 displaced citations corrected across REQ files.

