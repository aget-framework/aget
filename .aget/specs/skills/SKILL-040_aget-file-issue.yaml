# SKILL-040: aget-file-issue

## Description

File issues with private-first routing governance (L638). ALL agents route to `{private-tracker}` by default. Public issues on `aget-framework/aget` require explicit promotion with principal approval (R-ISSUE-011 through R-ISSUE-014).

## Capabilities

| ID | Pattern | Statement |
|----|---------|-----------|
| CAP-SKILL-040-01 | ubiquitous | The SYSTEM shall determine agent type (private fleet vs public/remote) |
| CAP-SKILL-040-02 | ubiquitous | The SYSTEM shall route ALL issues to `{private-tracker}` (private-first routing per L638) |
| CAP-SKILL-040-03 | conditional | IF an issue requires public visibility THEN the SYSTEM shall require promotion via CAP-ISSUE-005 |
| CAP-SKILL-040-04 | ubiquitous | The SYSTEM shall validate content for private patterns at the promotion boundary |
| CAP-SKILL-040-05 | ubiquitous | The SYSTEM shall support issue types: enhancement, bug, feature |
| CAP-SKILL-040-06 | ubiquitous | The SYSTEM shall validate required fields before filing |

## Input Format

```
/aget-file-issue <type> [title]

Types:
- enhancement: Feature enhancement request
- bug: Bug report
- feature: New feature request
```

## Routing Logic

```
Agent Detection:
1. Check if path contains gmelli/ or private- prefix
2. Check .aget/version.json for fleet=private
3. Check git remote for gmelli/*

Routing (L638 Private-First):
- ALL agents → {private-tracker} (no sanitization needed at filing time)

Promotion (requires principal approval):
- Private issue → aget-framework/aget (with sanitization per R-ISSUE-012)
- Requires: R-ISSUE-011 (approval), R-ISSUE-013 (source ref), R-ISSUE-014 (no private identifiers)
```

## Sanitization Patterns (Promotion Boundary Only)

Patterns to detect/redact WHEN promoting to public (not at filing time):

| Pattern | Replacement | Example |
|---------|-------------|---------|
| `private-*-aget` | `[PRIVATE-AGENT]` | `private-work-supervisor-AGET` |
| `private-*-AGET` | `[PRIVATE-AGENT]` | `private-aget-framework-AGET` |
| `gmelli/*` | `[INTERNAL-REPO]` | `{private-tracker}` |
| Fleet size numbers | `[N agents]` | `28 agents in fleet` |
| Session references | `[SESSION]` | `SESSION_2026-01-11` |
| Internal project IDs | `[PROJECT-ID]` | `FLEET-UPG-004` |

## Constraints

| ID | Type | Statement |
|----|------|-----------|
| C1 | prohibitive | NEVER file directly to `aget-framework/aget` — use promotion workflow |
| C2 | prohibitive | NEVER include private agent names in promoted public issues |
| C3 | prohibitive | NEVER include fleet size in promoted public issues |
| C4 | prohibitive | NEVER include internal repo references in promoted public issues |
| C5 | mandatory | ALWAYS route to `{private-tracker}` by default |
| C6 | mandatory | ALWAYS validate destination before filing |

## Test Cases

| ID | Test | Expected |
|----|------|----------|
| T1 | Private agent files issue | Routes to {private-tracker} |
| T2 | Public agent files issue | Routes to {private-tracker} (same — L638) |
| T3 | Issue promoted without approval | Blocked — R-ISSUE-011 |
| T4 | Promoted issue contains private-*-aget | Blocked — R-ISSUE-014 |
| T5 | Missing required fields | Validation error, no filing |

## Allowed Tools

- Bash (for gh issue create)
- Read (for agent detection)
- Grep (for sanitization patterns)

